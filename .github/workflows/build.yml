name: Build Windows EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller
          pip uninstall -y PySimpleGUI pysimplegui 2>$null || true
      
      - name: Build exe
        run: |
          echo "Building..."
          pyinstaller main_onefile.spec
          echo "Build finished"
          echo "Checking dist:"
          Get-ChildItem dist/ -Recurse -File | Select-Object FullName, Length

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        if: github.event_name == 'workflow_dispatch'
        with:
          files: dist/ConstructionCostApp.exe
          tag_name: v1.0.0
          name: Construction Cost App v1.0.0
          body: Windows standalone executable
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
