name: Build Windows EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller
          pip uninstall -y PySimpleGUI pysimplegui 2>$null || true
      
      - name: Build exe
        run: |
          echo "Building..."
          pyinstaller main_onefile.spec
          echo "Build finished"
          echo "Checking dist:"
          Get-ChildItem dist/ -Recurse -File | Select-Object FullName, Length

      - name: Upload to Release
        run: |
          # 使用 PowerShell 获取 exe 完整路径并上传
          $exePath = Get-ChildItem -Path . -Recurse -Filter "ConstructionCostApp.exe" | Select-Object -First 1 -ExpandProperty FullName
          Write-Host "Found exe: $exePath"
          # 使用 GitHub CLI 上传
          gh release upload v1.0.0 "$exePath" --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
