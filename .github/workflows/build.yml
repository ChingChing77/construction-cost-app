name: Build Windows EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller
          pip uninstall -y PySimpleGUI pysimplegui 2>$null || true
      
      - name: Build exe
        run: |
          pyinstaller main_onefile.spec --log-level WARN
          if (Test-Path dist/ConstructionCostApp.exe) {
            Write-Host "[OK] Exe found: $(Get-Item dist/ConstructionCostApp.exe | Select-Object -ExpandProperty Length) bytes"
          } else {
            Write-Host "[ERROR] Exe not found in dist/"
            Get-ChildItem dist/
          }
      
      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        if: github.event_name == 'workflow_dispatch'
        with:
          files: dist/ConstructionCostApp.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
