name: Build Windows EXE

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller
          pip uninstall -y PySimpleGUI pysimplegui 2>$null || true

      - name: Build exe
        run: |
          echo "Building..."
          pyinstaller main_onefile.spec
          echo "Build finished"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "build\main_onefile\ConstructionCostApp.exe" "dist\ConstructionCostApp.exe" -Force -ErrorAction Stop
          Write-Host "Exe size: $((Get-Item dist\ConstructionCostApp.exe).Length) bytes"

      - name: Upload to Release
        run: |
          Write-Host "Uploading exe to release..."
          gh release upload v1.0.0 "dist\ConstructionCostApp.exe" --clobber
